<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday 🎉</Mimi>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      z-index: 2;
    }

    h1 {
      font-size: 2.5rem;
      color: #ff4081;
    }

    p {
      font-size: 1.2rem;
      color: #444;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #ff4081;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 1;
    }
  </style>
</head>
<body>

<canvas id="confetti"></canvas>

<div class="card">
  <h1>🎂 Happy Birthday, Mimi! 🎉</h1>
  <p>
    1st May… your special day ❤️<br><br>

    I’m really happy to have you in my life, Mimi.
    It’s almost been a year since we met in 2025…
    but honestly, it still feels like I met you just yesterday.

    <br><br>

    You’re not just someone I know…
    you’re someone really special to me.

    <br><br>

    I don’t say this enough, but…
    you’ve always been my crush 💫

    <br><br>

    Your smile, your presence, the way you are…
    everything about you makes my world a little brighter.

    <br><br>

    I hope this year brings you happiness, love, and everything you deserve.
    And I hope I can stay by your side…
    creating more memories with you.

    <br><br>

    Happy Birthday once again, Mimi ❤️🎂
  </p>

  <button onclick="startConfetti()">Celebrate 🎊</button>
</div>

<script>
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let confetti = [];

function randomColor() {
  const colors = ['#ff4081', '#ffeb3b', '#4caf50', '#2196f3', '#ff5722'];
  return colors[Math.floor(Math.random() * colors.length)];
}

function createConfetti() {
  for (let i = 0; i < 150; i++) {
    confetti.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      r: Math.random() * 6 + 2,
      d: Math.random() * 50,
      color: randomColor(),
      tilt: Math.random() * 10 - 10
    });
  }
}

function drawConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  confetti.forEach(c => {
    ctx.beginPath();
    ctx.fillStyle = c.color;
    ctx.fillRect(c.x, c.y, c.r, c.r);
  });

  updateConfetti();
}

function updateConfetti() {
  confetti.forEach(c => {
    c.y += Math.cos(c.d) + 1 + c.r / 2;
    c.x += Math.sin(c.d);

    if (c.y > canvas.height) {
      c.y = -10;
      c.x = Math.random() * canvas.width;
    }
  });
}

function startConfetti() {
  createConfetti();
  setInterval(drawConfetti, 20);
}

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
